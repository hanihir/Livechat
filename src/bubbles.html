<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; -webkit-user-select: none; user-select: none; pointer-events: none; }
    .stack { position: absolute; display: flex; flex-direction: column; gap: 12px; max-width: 46vw; }
    /* ancrages */
    .stack.bottom-right { right: 24px; bottom: 24px; align-items: flex-end; flex-direction: column; }
    .stack.bottom-left  { left: 24px;  bottom: 24px; align-items: flex-start; flex-direction: column; }
    .stack.top-right    { right: 24px; top: 24px;    align-items: flex-end; flex-direction: column-reverse; }
    .stack.top-left     { left: 24px;  top: 24px;    align-items: flex-start; flex-direction: column-reverse; }
    .stack.center       { left: 50%; top: 50%; transform: translate(-50%, -50%); align-items: center; }

    .bubble {
      background: #FBF1DE; color: #18140E;
      border: 3px solid #18140E; border-radius: 18px 18px 4px 18px;
      box-shadow: 6px 6px 0 #18140E; padding: 10px 16px;
      font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 500; line-height: 1.3;
      word-break: break-word; overflow-wrap: anywhere;
      animation: pop .35s cubic-bezier(.2,.9,.3,1.3) both;
    }
    /* tailles */
    .bubble.small  { font-size: 14px; max-width: 300px; }
    .bubble.medium { font-size: 18px; max-width: 400px; }
    .bubble.large  { font-size: 26px; max-width: 540px; padding: 14px 22px; }
    .stack.bottom-left .bubble, .stack.top-left .bubble { border-radius: 18px 18px 18px 4px; }

    .bubble.out { animation: out .4s ease forwards; }
    .bubble .who {
      display: block; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
      color: #FF5DA2; margin-bottom: 2px; letter-spacing: -0.01em;
      font-size: .78em;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(14px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes out { to { opacity: 0; transform: scale(.92); } }
  </style>
</head>
<body>
  <div class="stack bottom-right" data-pos="bottom-right"></div>
  <div class="stack bottom-left"  data-pos="bottom-left"></div>
  <div class="stack top-right"    data-pos="top-right"></div>
  <div class="stack top-left"     data-pos="top-left"></div>
  <div class="stack center"       data-pos="center"></div>
  <script>
    const MAX = 6;       // bulles max par ancrage
    const LIFE = 8000;   // durée d'affichage (ms)
    const stacks = {};
    document.querySelectorAll('.stack').forEach((s) => { stacks[s.dataset.pos] = s; });

    window.api.onBubbleData(({ from, text, pos, size }) => {
      if (!text) return;
      const stack = stacks[pos] || stacks['bottom-right'];
      const b = document.createElement('div');
      b.className = 'bubble ' + (['small', 'medium', 'large'].includes(size) ? size : 'medium');
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = from || 'Anonyme';
      const msg = document.createElement('span');
      msg.textContent = text;
      b.appendChild(who); b.appendChild(msg);
      stack.appendChild(b);

      while (stack.children.length > MAX) stack.removeChild(stack.firstChild);

      setTimeout(() => {
        b.classList.add('out');
        setTimeout(() => b.remove(), 420);
      }, LIFE);
    });
  </script>
</body>
</html>
