<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; -webkit-user-select: none; user-select: none; pointer-events: none; }
    #stack {
      position: absolute; right: 24px; bottom: 24px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    }
    .bubble {
      max-width: 380px; background: #FBF1DE; color: #18140E;
      border: 3px solid #18140E; border-radius: 18px 18px 4px 18px;
      box-shadow: 6px 6px 0 #18140E;
      padding: 10px 16px;
      font-family: 'Hanken Grotesk', system-ui, sans-serif; font-size: 17px; font-weight: 500; line-height: 1.3;
      word-break: break-word; overflow-wrap: anywhere;
      animation: pop .35s cubic-bezier(.2,.9,.3,1.3) both;
    }
    .bubble.out { animation: out .4s ease forwards; }
    .bubble .who {
      display: block; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
      font-size: 13px; color: #FF5DA2; margin-bottom: 2px; letter-spacing: -0.01em;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(14px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes out { to { opacity: 0; transform: translateX(30px) scale(.92); } }
  </style>
</head>
<body>
  <div id="stack"></div>
  <script>
    const stack = document.getElementById('stack');
    const MAX = 6;       // nombre de bulles affichées en même temps
    const LIFE = 8000;   // durée d'affichage (ms)

    window.api.onBubbleData(({ from, text }) => {
      if (!text) return;
      const b = document.createElement('div');
      b.className = 'bubble';
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = from || 'Anonyme';
      const msg = document.createElement('span');
      msg.textContent = text;
      b.appendChild(who); b.appendChild(msg);
      stack.appendChild(b);

      // limite le nombre de bulles
      while (stack.children.length > MAX) stack.removeChild(stack.firstChild);

      setTimeout(() => {
        b.classList.add('out');
        setTimeout(() => b.remove(), 420);
      }, LIFE);
    });
  </script>
</body>
</html>
