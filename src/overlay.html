<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 70vw;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 0.35s ease,
        transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    }
    img.show { opacity: 1; transform: scale(1); }
    img.hide { opacity: 0; transform: scale(0.92); }
  </style>
</head>
<body>
  <div class="wrap"><img id="pic" alt="" /></div>
  <script src="overlay.js"></script>
</body>
</html>
