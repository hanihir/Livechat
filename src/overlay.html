<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 0.35s ease,
        transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    }
    .frame.show { opacity: 1; transform: scale(1); }
    .frame.hide { opacity: 0; transform: scale(0.92); }
    img {
      max-width: 70vw;
      max-height: 64vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
    }
    .caption {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6c5ce7, #00d2ff);
      padding: 8px 18px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame" id="frame">
      <img id="pic" alt="" />
      <div class="caption" id="caption"></div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
