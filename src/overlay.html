<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    .wrap {
      box-sizing: border-box;
      width: 100vw;
      height: 100vh;
      padding: 4vh 4vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
    }
    /* Effets d'apparition (animation sur .frame ; effets continus sur .media) */
    .frame.fx-none  { animation: pop .45s cubic-bezier(.2,.9,.3,1.3) both; }
    .frame.fx-fall  { animation: fall .8s cubic-bezier(.2,.7,.3,1.25) both; }
    .frame.fx-zoom  { animation: zoomin .55s cubic-bezier(.2,.9,.3,1.4) both; }
    .frame.fx-spin  { animation: spinin .75s cubic-bezier(.2,.8,.3,1.2) both; }
    .frame.fx-shake { animation: pop .3s ease both; }
    .frame.fx-shake .media { animation: shake .35s .3s infinite; }
    .frame.fx-glitch { animation: pop .25s ease both; }
    .frame.fx-glitch .media { animation: glitch .45s .25s infinite; }
    .frame.fx-pulse { animation: pop .3s ease both; }
    .frame.fx-pulse .media { animation: pulse 1s .3s infinite; }
    .frame.hide, .frame.hide .media { animation: none !important; }
    .frame.hide {
      opacity: 0 !important; transform: scale(.9) rotate(-1.5deg) !important;
      transition: opacity .35s ease, transform .35s ease;
    }
    @keyframes pop { from { opacity:0; transform: scale(.8) rotate(-1.5deg);} 60% { opacity:1; transform: scale(1.04) rotate(-1.5deg);} to { opacity:1; transform: scale(1) rotate(-1.5deg);} }
    @keyframes fall { 0% { opacity:0; transform: translateY(-120vh) rotate(-8deg);} 70% { opacity:1; transform: translateY(22px) rotate(2deg);} 100% { opacity:1; transform: translateY(0) rotate(-1.5deg);} }
    @keyframes zoomin { 0% { opacity:0; transform: scale(.08);} 70% { opacity:1; transform: scale(1.12) rotate(-1.5deg);} 100% { opacity:1; transform: scale(1) rotate(-1.5deg);} }
    @keyframes spinin { 0% { opacity:0; transform: scale(.2) rotate(-540deg);} 100% { opacity:1; transform: scale(1) rotate(-1.5deg);} }
    @keyframes shake { 0%,100% { transform: translate(0,0) rotate(0);} 20% { transform: translate(-7px,3px) rotate(-1.5deg);} 40% { transform: translate(7px,-3px) rotate(1.5deg);} 60% { transform: translate(-5px,-3px) rotate(-1deg);} 80% { transform: translate(5px,3px) rotate(1deg);} }
    @keyframes glitch { 0%,100% { transform: translate(0,0) skewX(0);} 20% { transform: translate(-5px,0) skewX(7deg);} 40% { transform: translate(5px,0) skewX(-7deg);} 60% { transform: translate(-3px,2px) skewX(4deg);} 80% { transform: translate(3px,-2px) skewX(-4deg);} }
    @keyframes pulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.07);} }
    .media { position: relative; display: inline-block; line-height: 0; }
    #pic, #vid {
      max-width: 70vw;
      max-height: 64vh;
      object-fit: contain;
      border-radius: 14px;
      border: 5px solid #FBF1DE;
      box-shadow: 0 0 0 3px #18140E, 14px 14px 0 #18140E;
    }
    #vid { display: none; }
    /* couche texte par-dessus le GIF (sans aplatir = animation conservée) */
    .gdraw { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: none; border-radius: 14px; }
    .gtext { position: absolute; inset: 0; pointer-events: none; }
    .gt {
      position: absolute; white-space: normal; word-break: break-word; line-height: 1.05;
      font-family: Impact, 'Arial Black', sans-serif; font-weight: 400;
      padding: 0 2px; text-align: center; transform: translate(-50%, -50%); max-width: 92%;
    }
    .caption {
      font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #18140E;
      background: #C7F24E;
      padding: 9px 20px;
      border: 3px solid #18140E;
      border-radius: 999px;
      box-shadow: 5px 5px 0 #18140E;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame" id="frame">
      <div class="media" id="media">
        <img id="pic" alt="" />
        <video id="vid" playsinline></video>
        <img id="gdraw" class="gdraw" alt="" />
        <div class="gtext" id="gtext"></div>
      </div>
      <div class="caption" id="caption"></div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
