<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    .wrap {
      box-sizing: border-box;
      width: 100vw;
      height: 100vh;
      padding: 4vh 4vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      transform: scale(0.82) rotate(-1.5deg);
      transition: opacity 0.35s ease,
        transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    }
    .frame.show { opacity: 1; transform: scale(1) rotate(-1.5deg); }
    .frame.hide { opacity: 0; transform: scale(0.92) rotate(-1.5deg); }
    img {
      max-width: 70vw;
      max-height: 64vh;
      object-fit: contain;
      border-radius: 14px;
      border: 5px solid #FBF1DE;
      box-shadow: 0 0 0 3px #18140E, 14px 14px 0 #18140E;
    }
    .caption {
      font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #18140E;
      background: #C7F24E;
      padding: 9px 20px;
      border: 3px solid #18140E;
      border-radius: 999px;
      box-shadow: 5px 5px 0 #18140E;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame" id="frame">
      <img id="pic" alt="" />
      <div class="caption" id="caption"></div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
