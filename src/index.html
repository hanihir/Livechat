<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>LiveChatr</title>
  <style>
    :root {
      --bg: #0f1020;
      --card: #1a1b30;
      --accent: #6c5ce7;
      --accent2: #00d2ff;
      --text: #eef0ff;
      --muted: #9aa0c0;
      --ok: #2ecc71;
      --bad: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #232450, var(--bg));
      color: var(--text);
      padding: 22px;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 { font-size: 22px; margin: 0 0 2px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    label.field { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type=text], input[type=url] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0e0f1f;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input[type=text]:focus, input[type=url]:focus { border-color: var(--accent); }
    .drop {
      border: 2px dashed rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
      color: var(--muted);
    }
    .drop:hover { border-color: var(--accent); color: var(--text); background: rgba(108, 92, 231, 0.08); }
    .preview { margin-top: 12px; text-align: center; }
    .preview img { max-width: 100%; max-height: 180px; border-radius: 10px; }
    .row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    .dur { font-variant-numeric: tabular-nums; font-weight: 700; min-width: 54px; text-align: right; }
    button.send {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transition: transform 0.1s, opacity 0.2s;
    }
    button.send:hover { transform: translateY(-1px); }
    button.send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-top: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bad); transition: 0.2s; }
    .dot.on { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
    details { margin-top: 8px; }
    summary { cursor: pointer; color: var(--muted); font-size: 12px; }
    code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 5px; }

    /* En-tête de carte avec compteur */
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .card-head .title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .badge { background: rgba(108,92,231,.25); color: #c9c2ff; font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }

    /* Choix des destinataires */
    .check { display: flex; align-items: center; gap: 10px; padding: 9px 4px; cursor: pointer; font-size: 14px; }
    .check input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
    .everyone { border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 4px; font-weight: 600; }
    .userlist { max-height: 160px; overflow-y: auto; }
    .userlist .me { color: var(--muted); }
    .userlist .empty { color: var(--muted); font-size: 13px; padding: 8px 4px; }
    .userlist.disabled { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <h1>📺 LiveChatr</h1>
  <div class="sub">Balance une image en plein écran à tes potes connectés.</div>

  <div class="card">
    <label class="field">Ton pseudo</label>
    <input id="name" type="text" placeholder="Ex : Hani" maxlength="40" />
  </div>

  <div class="card">
    <label class="field">Image à envoyer</label>
    <div class="drop" id="drop">Clique ici pour choisir une image 🖼️</div>
    <input id="file" type="file" accept="image/*" hidden />
    <div class="preview" id="preview"></div>
  </div>

  <div class="card">
    <label class="field">Durée d'affichage</label>
    <div class="row">
      <input id="dur" type="range" min="1" max="30" value="5" />
      <span class="dur"><span id="durVal">5</span> s</span>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="title">Destinataires</span>
      <span class="badge" id="onlineCount">0 en ligne</span>
    </div>
    <label class="check everyone">
      <input type="checkbox" id="everyone" checked />
      🌍 Tout le monde
    </label>
    <div class="userlist" id="userList"></div>
  </div>

  <button class="send" id="send" disabled>Envoyer 🚀</button>

  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Connexion…</span>
  </div>

  <details>
    <summary>⚙️ Réglages serveur</summary>
    <div class="card" style="margin-top: 8px;">
      <label class="field">Adresse du serveur</label>
      <input id="server" type="url" placeholder="wss://mon-serveur.onrender.com" />
      <div class="sub" style="margin: 8px 0 0;">
        Par défaut : ton serveur en ligne. Pour tester en local : <code>ws://localhost:8080</code>.
      </div>
    </div>
  </details>

  <script src="renderer.js"></script>
</body>
</html>
