<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>LiveChatr</title>
  <style>
    :root {
      --bg: #0f1020;
      --card: #1a1b30;
      --accent: #6c5ce7;
      --accent2: #00d2ff;
      --text: #eef0ff;
      --muted: #9aa0c0;
      --ok: #2ecc71;
      --bad: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #232450, var(--bg));
      color: var(--text);
      padding: 22px;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 { font-size: 22px; margin: 0 0 2px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type=text], input[type=url] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0e0f1f;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input[type=text]:focus, input[type=url]:focus { border-color: var(--accent); }
    .drop {
      border: 2px dashed rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
      color: var(--muted);
    }
    .drop:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108, 92, 231, 0.08);
    }
    .preview { margin-top: 12px; text-align: center; }
    .preview img { max-width: 100%; max-height: 180px; border-radius: 10px; }
    .row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    .dur {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      min-width: 54px;
      text-align: right;
    }
    button.send {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transition: transform 0.1s, opacity 0.2s;
    }
    button.send:hover { transform: translateY(-1px); }
    button.send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bad); transition: 0.2s; }
    .dot.on { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
    details { margin-top: 8px; }
    summary { cursor: pointer; color: var(--muted); font-size: 12px; }
    code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>📺 LiveChatr</h1>
  <div class="sub">Balance une image en plein écran à tous tes potes connectés.</div>

  <div class="card">
    <label>Ton pseudo</label>
    <input id="name" type="text" placeholder="Ex : Hani" />
  </div>

  <div class="card">
    <label>Image à envoyer</label>
    <div class="drop" id="drop">Clique ici pour choisir une image 🖼️</div>
    <input id="file" type="file" accept="image/*" hidden />
    <div class="preview" id="preview"></div>
  </div>

  <div class="card">
    <label>Durée d'affichage</label>
    <div class="row">
      <input id="dur" type="range" min="1" max="30" value="5" />
      <span class="dur"><span id="durVal">5</span> s</span>
    </div>
  </div>

  <button class="send" id="send" disabled>Envoyer à tout le monde 🚀</button>

  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Connexion…</span>
  </div>

  <details>
    <summary>⚙️ Réglages serveur</summary>
    <div class="card" style="margin-top: 8px;">
      <label>Adresse du serveur</label>
      <input id="server" type="url" placeholder="wss://mon-serveur.onrender.com" />
      <div class="sub" style="margin: 8px 0 0;">
        Laisse <code>ws://localhost:8080</code> pour tester sur ton PC.
      </div>
    </div>
  </details>

  <script src="renderer.js"></script>
</body>
</html>
